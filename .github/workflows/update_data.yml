name: Update Stock Signals

on:
  schedule:
    # 每 6 小時跑一次（UTC） → TPE 03:00, 09:00, 15:00, 21:00
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:   ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: python scripts/pipeline.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Backup pipeline output before touching git
          cp -r public/data /tmp/pipeline-data

          # Discard local modifications so reset has a clean tree
          git restore .

          # Hard-sync to remote so push is always fast-forward (no race condition)
          git fetch origin main
          git reset --hard origin/main

          # Restore our generated files
          cp /tmp/pipeline-data/latest_signals.json public/data/latest_signals.json
          cp -r /tmp/pipeline-data/history/. public/data/history/

          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "data: refresh signals $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push